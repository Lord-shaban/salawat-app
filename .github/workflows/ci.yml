name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    # In the future, unit testing and E2E can go here.
    # - name: Run Tests
    #   run: npm run test

    - name: Build application
      run: npm run build
      env:
        # Mock env vars for build process
        UPSTASH_REDIS_REST_URL: 'https://mock.upstash.io'
        UPSTASH_REDIS_REST_TOKEN: 'mock_token'
